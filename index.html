<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --ink:    #1a1a2e;
  --ink2:   #252540;
  --surface:#f4f1ec;
  --paper:  #faf8f4;
  --edge:   #e2ddd6;
  --muted:  #8a8a9a;
  --muted2: #b0aaaa;
  --duo:    #4a9e6e;
  --solo:   #c45a5a;
  --r:      14px;
  --rs:     9px;
}

body {
  font-family: 'Geist Mono', monospace;
  background: var(--surface);
  color: var(--ink);
  min-height: 100dvh;
  overflow-x: hidden;
  padding-bottom: 40px;
}

/* WEEK NAV */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: var(--paper);
  border-bottom: 1px solid var(--edge);
  position: sticky;
  top: 0;
  z-index: 99;
}
.week-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.nav-btn {
  background: none;
  border: 1px solid var(--edge);
  border-radius: 7px;
  color: var(--muted);
  width: 30px; height: 30px;
  font-size: 17px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn:active { background: var(--edge); }

/* DAYS STRIP */
.days-strip {
  display: flex;
  gap: 5px;
  padding: 10px 14px;
  background: var(--paper);
  border-bottom: 1px solid var(--edge);
}
.day-chip {
  flex: 1;
  background: none;
  border: 1px solid var(--edge);
  border-radius: var(--rs);
  padding: 8px 2px 6px;
  color: var(--muted);
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  transition: all 0.15s;
}
.day-chip .dn { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; }
.day-chip .dd { font-size: 15px; font-weight: 600; line-height: 1.2; }
.day-chip .chip-dots { display: flex; gap: 2px; height: 5px; align-items: center; margin-top: 2px; }
.day-chip .chip-dots span { width: 4px; height: 4px; border-radius: 50%; display: block; }
.day-chip.active { background: var(--ink); border-color: var(--ink); color: var(--surface); }

/* REGISTER */
.register-section {
  padding: 16px 16px 14px;
}
.date-heading {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}
.reg-buttons { display: flex; gap: 10px; }

.reg-btn {
  flex: 1;
  border: none;
  border-radius: var(--r);
  padding: 22px 12px;
  font-family: 'Geist Mono', monospace;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.14em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s, box-shadow 0.15s;
  color: white;
}
.reg-btn:active { transform: scale(0.97); }

.reg-btn-duo { background: var(--duo); }
.reg-btn-solo { background: var(--solo); }
.reg-btn-pause {
  flex: 0 0 44px !important;
  background: var(--paper);
  border: 1px solid var(--edge);
  color: var(--muted) !important;
  transition: transform 0.1s, box-shadow 0.15s, color 0.15s;
}
.reg-btn-pause.on { color: var(--ink) !important; box-shadow: 0 0 0 3px rgba(26,26,46,0.2); }

.reg-btn-duo.on  { box-shadow: 0 0 0 3px rgba(74,158,110,0.35); }
.reg-btn-solo.on { box-shadow: 0 0 0 3px rgba(196,90,90,0.35); }

/* DIVIDER */
.section-divider {
  height: 1px;
  background: var(--edge);
  margin: 0 16px;
}

/* CALENDAR */
.cal-section { padding: 16px 16px 12px; }

.sub-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.sub-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted2);
}
.month-nav { display: flex; align-items: center; gap: 8px; }
.month-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  min-width: 100px;
  text-align: center;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.cal-dh {
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted2);
  text-align: center;
  padding: 2px 0 8px;
}
.cal-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 4px 0 2px;
  cursor: pointer;
  border-radius: var(--rs);
  transition: background 0.1s;
}
.cal-cell:active { background: var(--edge); }
.cal-cell.empty { pointer-events: none; }

.cal-num-wrap {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 3px;
}
.cal-num {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
}
.cal-cell.is-today .cal-num-wrap {
  background: var(--ink);
}
.cal-cell.is-today .cal-num { color: var(--surface); }

.cal-cell.is-selected:not(.is-today) .cal-num-wrap {
  background: var(--ink2);
  opacity: 0.75;
}
.cal-cell.is-selected:not(.is-today) .cal-num { color: var(--surface); }

.cal-dots {
  display: flex;
  gap: 2px;
  min-height: 5px;
}
.cal-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* STATS */
.stats-section { padding: 0 16px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.stat-card {
  background: var(--paper);
  border: 1px solid var(--edge);
  border-radius: var(--r);
  padding: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.stat-half {
  flex: 1;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.stat-half + .stat-half { border-top: 1px solid var(--edge); }
.stat-row-label {
  font-size: 9px;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 4px;
}
.stat-row-val { font-size: 20px; font-weight: 400; line-height: 1; }

/* APP HEADER */
.app-header {
  padding: 8px 12px 8px 16px;
  background: var(--paper);
  border-bottom: 1px solid var(--edge);
  display: flex;
  align-items: center;
}
.header-actions { display: flex; gap: 6px; }

/* EXPORT / IMPORT */
.data-btn {
  background: none;
  border: 1px solid var(--edge);
  border-radius: 50%;
  width: 30px;
  height: 30px;
  font-size: 15px;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
  line-height: 1;
  font-family: 'Geist Mono', monospace;
}
.data-btn:active { background: var(--edge); color: var(--ink); }

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--ink);
  color: var(--surface);
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  z-index: 900;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app-header">
  <div style="width:66px"></div>
  <div style="flex:1"></div>
  <div class="header-actions">
    <button class="data-btn" onclick="exportData()" title="Eksporter">↑</button>
    <button class="data-btn" onclick="document.getElementById('import-input').click()" title="Importer">↓</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div class="week-nav">
  <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
  <span class="week-label" id="week-label">Uke —</span>
  <button class="nav-btn" onclick="changeWeek(1)">›</button>
</div>

<div class="days-strip" id="days-strip"></div>

<div class="register-section">
  <div class="date-heading" id="date-heading">—</div>
  <div class="reg-buttons">
    <button class="reg-btn reg-btn-duo" id="btn-duo" onclick="toggle('duo')">DUO</button>
    <button class="reg-btn reg-btn-pause" id="btn-pause" onclick="toggle('pause')">
      <svg width="14" height="18" viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="4" height="16" rx="1.5" fill="currentColor"/>
        <rect x="9" y="1" width="4" height="16" rx="1.5" fill="currentColor"/>
      </svg>
    </button>
    <button class="reg-btn reg-btn-solo" id="btn-solo" onclick="toggle('solo')">SOLO</button>
  </div>
</div>

<div class="section-divider"></div>

<div class="cal-section">
  <div class="sub-header">
    <span class="sub-title">Kalender</span>
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="month-label">—</span>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="section-divider" style="margin-bottom:14px"></div>

<div class="stats-section">
  <div class="stats-grid" id="stats-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS_NO   = ['Man','Tir','Ons','Tor','Fre','Lør','Søn'];
const DAYS_LONG = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag','Søndag'];
const MONTHS_NO = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
const DUO_C  = '#4a9e6e';
const SOLO_C = '#c45a5a';

function load() { try { return JSON.parse(localStorage.getItem('ds_v1') || '{}'); } catch { return {}; } }
function save(d) { localStorage.setItem('ds_v1', JSON.stringify(d)); }

function ds(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function mondayOf(d) {
  const c = new Date(d); c.setHours(0,0,0,0);
  const wd = c.getDay();
  c.setDate(c.getDate() - (wd === 0 ? 6 : wd - 1));
  return c;
}

function isoWeek(d) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dow = t.getUTCDay() || 7;
  t.setUTCDate(t.getUTCDate() + 4 - dow);
  const y1 = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
  return [t.getUTCFullYear(), Math.ceil(((t - y1) / 86400000 + 1) / 7)];
}

let weekOff  = 0;
let monthOff = 0;
let activeDay = ds(new Date());
const TODAY   = ds(new Date());

function weekDates() {
  const ws = mondayOf(new Date());
  ws.setDate(ws.getDate() + weekOff * 7);
  return Array.from({length:7}, (_, i) => { const d = new Date(ws); d.setDate(ws.getDate()+i); return d; });
}

function weekOffForDate(dateStr) {
  const target = mondayOf(new Date(dateStr + 'T12:00:00'));
  const current = mondayOf(new Date());
  return Math.round((target - current) / (7 * 24 * 60 * 60 * 1000));
}
function changeWeek(n) { weekOff += n; render(); }
function changeMonth(n) { monthOff += n; renderCal(); renderStats(); }

function toggle(type) {
  const all = load();
  if (!all[activeDay]) all[activeDay] = {};
  all[activeDay][type] = !all[activeDay][type];
  if (!all[activeDay].duo && !all[activeDay].solo && !all[activeDay].pause) delete all[activeDay];
  save(all);
  render();
  toast(type.toUpperCase() + (all[activeDay] && all[activeDay][type] ? ' ✓' : ' fjernet'));
}

function render() { renderStrip(); renderButtons(); renderCal(); renderStats(); }

function renderStrip() {
  const dates = weekDates();
  const all   = load();
  const [yr, wk] = isoWeek(dates[0]);
  document.getElementById('week-label').textContent = `Uke ${wk} · ${yr}`;

  const pd  = new Date(activeDay + 'T12:00:00');
  document.getElementById('date-heading').textContent =
    `${DAYS_LONG[(pd.getDay()+6)%7]} ${pd.getDate()}. ${MONTHS_NO[pd.getMonth()].toLowerCase()}`;

  const strip = document.getElementById('days-strip');
  strip.innerHTML = '';
  dates.forEach(d => {
    const key = ds(d);
    const e   = all[key] || {};
    const btn = document.createElement('button');
    const isActive = key === activeDay;
    btn.className = 'day-chip' + (isActive ? ' active' : '');

    let dotHtml = '<div class="chip-dots">';
    if (e.duo)   dotHtml += `<span style="background:${isActive ? 'rgba(255,255,255,0.7)' : DUO_C}"></span>`;
    if (e.pause) dotHtml += `<span style="background:${isActive ? 'rgba(255,255,255,0.7)' : '#1a1a2e'}"></span>`;
    if (e.solo)  dotHtml += `<span style="background:${isActive ? 'rgba(255,255,255,0.7)' : SOLO_C}"></span>`;
    dotHtml += '</div>';

    btn.innerHTML = `<span class="dn">${DAYS_NO[(d.getDay()+6)%7]}</span><span class="dd">${d.getDate()}</span>${dotHtml}`;
    btn.onclick = () => { activeDay = key; render(); };
    strip.appendChild(btn);
  });
}

function renderButtons() {
  const all = load();
  const e   = all[activeDay] || {};
  document.getElementById('btn-duo').classList.toggle('on', !!e.duo);
  document.getElementById('btn-pause').classList.toggle('on', !!e.pause);
  document.getElementById('btn-solo').classList.toggle('on', !!e.solo);
}

function renderCal() {
  const base = new Date();
  const m  = new Date(base.getFullYear(), base.getMonth() + monthOff, 1);
  const yr = m.getFullYear();
  const mi = m.getMonth();
  const all = load();

  document.getElementById('month-label').textContent =
    `${MONTHS_NO[mi].slice(0,3)} ${yr}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  ['M','T','O','T','F','L','S'].forEach(h => {
    const el = document.createElement('div');
    el.className = 'cal-dh';
    el.textContent = h;
    grid.appendChild(el);
  });

  const firstWd  = new Date(yr, mi, 1).getDay();
  const offset   = firstWd === 0 ? 6 : firstWd - 1;
  const daysInMo = new Date(yr, mi + 1, 0).getDate();

  for (let i = 0; i < offset; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  for (let day = 1; day <= daysInMo; day++) {
    const key  = `${yr}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const e    = all[key] || {};
    const cell = document.createElement('div');
    let cls = 'cal-cell';
    if (key === TODAY)     cls += ' is-today';
    if (key === activeDay) cls += ' is-selected';
    cell.className = cls;

    let dots = '';
    if (e.duo)   dots += `<div class="cal-dot" style="background:${DUO_C}"></div>`;
    if (e.pause) dots += `<div class="cal-dot" style="background:#1a1a2e"></div>`;
    if (e.solo)  dots += `<div class="cal-dot" style="background:${SOLO_C}"></div>`;

    cell.innerHTML = `
      <div class="cal-num-wrap"><span class="cal-num">${day}</span></div>
      <div class="cal-dots">${dots}</div>`;
    cell.onclick = () => { activeDay = key; weekOff = weekOffForDate(key); render(); };
    grid.appendChild(cell);
  }
}

function renderStats() {
  const base = new Date();
  const m  = new Date(base.getFullYear(), base.getMonth() + monthOff, 1);
  const yr = m.getFullYear();
  const mi = m.getMonth();
  const all = load();
  const daysInMo = new Date(yr, mi + 1, 0).getDate();

  let duo = 0, solo = 0;
  const elapsedWeeks = new Set();
  const now = new Date();
  const isCurrentMonth = (yr === now.getFullYear() && mi === now.getMonth());
  const countUpTo = isCurrentMonth ? now.getDate() : daysInMo;

  for (let day = 1; day <= daysInMo; day++) {
    const key = `${yr}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const e   = all[key] || {};
    if (e.duo)  duo++;
    if (e.solo) solo++;
    if (day <= countUpTo) {
      const [wy, wk] = isoWeek(new Date(yr, mi, day));
      elapsedWeeks.add(`${wy}-${wk}`);
    }
  }

  const weeks = elapsedWeeks.size || 1;
  const duoAvg  = (duo  / weeks).toFixed(1);
  const soloAvg = (solo / weeks).toFixed(1);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card">
      <div class="stat-half">
        <div class="stat-row-label">Denne måneden</div>
        <div class="stat-row-val" style="color:${DUO_C}">${duo}</div>
      </div>
      <div class="stat-half">
        <div class="stat-row-label">Ukentlig snitt</div>
        <div class="stat-row-val" style="color:${DUO_C}">${duoAvg}</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-half">
        <div class="stat-row-label">Denne måneden</div>
        <div class="stat-row-val" style="color:${SOLO_C}">${solo}</div>
      </div>
      <div class="stat-half">
        <div class="stat-row-label">Ukentlig snitt</div>
        <div class="stat-row-val" style="color:${SOLO_C}">${soloAvg}</div>
      </div>
    </div>
  `;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 1800);
}

function exportData() {
  const data = load();
  const json = JSON.stringify(data, null, 2);
  const today = new Date();
  const dstr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const filename = `trening-backup-${dstr}.json`;
  const blob = new Blob([json], { type: 'application/json' });
  const file = new File([blob], filename, { type: 'application/json' });
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: filename }).catch(() => {});
  } else {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error();
      save(parsed);
      render();
      toast('Data importert ✓');
    } catch {
      toast('Ugyldig fil');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

render();
</script>
</body>
</html>
